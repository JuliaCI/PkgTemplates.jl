name: CI
on:
  push:
    branches:
    <<#BRANCH>>
      - <<BRANCH>>
    <</BRANCH>>
    tags: ['*']
  pull_request:
  workflow_dispatch:
concurrency:
  # Skip intermediate builds: always.
  # Cancel intermediate builds: only if it is a pull request build.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version:
          <<#VERSIONS>>
          - '<<&.>>'
          <</VERSIONS>>
        os:
          <<#OS>>
          - <<&.>>
          <</OS>>
        arch:
          <<#ARCH>>
          - <<&.>>
          <</ARCH>>
        <<#HAS_EXCLUDES>>
        exclude:
        <</HAS_EXCLUDES>>
        <<#EXCLUDES>>
          - os: <<&E_OS>>
            arch: <<&E_ARCH>>
            <<#E_VERSION>>
            version: '<<&E_VERSION>>'
            <</E_VERSION>>
        <</EXCLUDES>>
    steps:
      - uses: <<& actions/checkout>>
      - uses: <<& julia-actions/setup-julia>>
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: <<& julia-actions/cache>>
      - uses: <<& julia-actions/julia-buildpkg>>
      - uses: <<& julia-actions/julia-runtest>>
      <<#HAS_CODECOV>>
      - uses: <<& julia-actions/julia-processcoverage>>
      - uses: <<& codecov/codecov-action>>
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
      <</HAS_CODECOV>>
      <<#HAS_COVERALLS>>
      - uses: <<& julia-actions/julia-uploadcoveralls>>
        env:
          COVERALLS_TOKEN: ${{ secrets.COVERALLS_TOKEN }}
      <</HAS_COVERALLS>>
  <<#HAS_DOCUMENTER>>
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    permissions:
      actions: write # needed to allow julia-actions/cache to proactively delete old caches that it has created
      contents: write
      statuses: write
    steps:
      - uses: <<& actions/checkout>>
      - uses: <<& julia-actions/setup-julia>>
        with:
          version: '1'
      - uses: <<& julia-actions/cache>>
      - uses: <<& julia-actions/julia-buildpkg>>
      - uses: <<& julia-actions/julia-docdeploy>>
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
      - name: Run doctests
        shell: julia --project=docs --color=yes {0}
        run: |
          using Documenter: DocMeta, doctest
          using <<&PKG>>
          DocMeta.setdocmeta!(<<&PKG>>, :DocTestSetup, :(using <<&PKG>>); recursive=true)
          doctest(<<&PKG>>)
  <</HAS_DOCUMENTER>>
  <<#HAS_RUNIC>>
  runic:
    name: Runic formatting
    runs-on: ubuntu-latest
    steps:
      - uses: <<& actions/checkout>>
      - uses: <<& fredrikekre/runic-action>>
        with:
          version: '1'
  <</HAS_RUNIC>>
